<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生选课系统 - 学生端</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-mesh"></div>
  <header class="student-header page-enter">
    <h1>课程中心</h1>
    <div>
      <span id="userName" style="margin-right:12px;color:var(--text-secondary);"></span>
      <a href="index.html" class="btn btn-ghost" id="logoutBtn" role="button">退出</a>
    </div>
  </header>
  <main class="student-main page-enter">
    <section>
      <h2 class="section-title">可选课程</h2>
      <div class="search-bar">
        <input type="text" id="keyword" placeholder="搜索课程名称或代码" />
        <button type="button" class="btn btn-primary" id="searchBtn">搜索</button>
      </div>
      <div id="courseList" class="course-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>
    <section style="margin-top:48px;">
      <h2 class="section-title">我的选课</h2>
      <div id="myCourses" class="course-grid">
        <div class="skeleton skeleton-card"></div>
      </div>
    </section>
    <section style="margin-top:48px;">
      <h2 class="section-title">考勤签到</h2>
      <div id="attendanceSection" style="background:var(--bg-glass);backdrop-filter:blur(12px);border:1px solid var(--bg-glass-border);border-radius:var(--radius);padding:32px;">
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
          <div style="flex:1;min-width:200px;">
            <label style="display:block;font-size:0.875rem;color:var(--text-secondary);margin-bottom:8px;">请输入 6 位签到码</label>
            <input type="text" id="attendanceCode" maxlength="6" placeholder="请输入签到码" style="width:100%;height:56px;padding:0 16px;background:rgba(255,255,255,0.04);border:1px solid var(--bg-glass-border);border-radius:12px;color:var(--text-primary);font-size:1.5rem;font-weight:700;letter-spacing:0.5rem;text-align:center;font-variant-numeric:tabular-nums;" />
          </div>
          <button type="button" class="btn btn-primary" id="signInBtn" style="min-width:140px;">立即签到</button>
        </div>
      </div>
    </section>
    <section style="margin-top:48px;">
      <h2 class="section-title">我的签到记录</h2>
      <div id="attendanceRecords" class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>课程名称</th>
              <th>课程代码</th>
              <th>签到时间</th>
              <th>发起时间</th>
            </tr>
          </thead>
          <tbody id="attendanceRecordsBody">
            <tr><td colspan="4" style="text-align:center;color:var(--text-secondary);">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>
  <!-- 退课确认弹框（非原生） -->
  <div id="confirmOverlay" class="modal-overlay confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
    <div class="modal modal-confirm">
      <h2 id="confirmTitle" class="confirm-title">确认</h2>
      <p id="confirmMessage" class="confirm-message"></p>
      <div class="modal-actions confirm-actions">
        <button type="button" class="btn btn-ghost" id="confirmCancel">取消</button>
        <button type="button" class="btn btn-danger" id="confirmOk">确定</button>
      </div>
    </div>
  </div>
  <script src="js/student.js"></script>
</body>
</html>
